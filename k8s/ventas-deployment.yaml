apiVersion: apps/v1
kind: Deployment
metadata:
  name: ventas
  namespace: despacho
  labels:
    app: ventas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ventas
  template:
    metadata:
      labels:
        app: ventas
    spec:
      containers:
        - name: ventas
          image: 889327993925.dkr.ecr.us-east-1.amazonaws.com/ventas-backend:eks-1
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: backend-env
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
