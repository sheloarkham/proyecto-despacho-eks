services:
  mysql:
    image: mysql:8.0
    container_name: despacho-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-despacho_db}
      MYSQL_USER: ${DB_USERNAME:-despacho_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-despacho_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - despacho-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ventas-service:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    container_name: ventas-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-despacho_db}
      DB_USERNAME: ${DB_USERNAME:-despacho_user}
      DB_PASSWORD: ${DB_PASSWORD:-despacho_pass}
    ports:
      - "8080:8080"
    networks:
      - despacho-net

  despachos-service:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: despachos-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-despacho_db}
      DB_USERNAME: ${DB_USERNAME:-despacho_user}
      DB_PASSWORD: ${DB_PASSWORD:-despacho_pass}
    ports:
      - "8081:8081"
    networks:
      - despacho-net

  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
      args:
        VITE_VENTAS_API_URL: /api/v1/ventas
        VITE_DESPACHOS_API_URL: /api/v1/despachos
    container_name: front-despacho
    restart: unless-stopped
    depends_on:
      - ventas-service
      - despachos-service
    ports:
      - "80:80"
    networks:
      - despacho-net

networks:
  despacho-net:
    driver: bridge

volumes:
  mysql_data:
