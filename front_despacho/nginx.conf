server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Front (publico) -> Back (interno) via DNS de Kubernetes Service
    # ventas-service y despachos-service son ClusterIP (solo dentro del cluster)
    location /api/v1/ventas {
        proxy_pass http://ventas-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/despachos {
        proxy_pass http://despachos-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
